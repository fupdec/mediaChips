name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache ML models
        uses: actions/cache@v4
        with:
          path: models
          key: mediachips-models-${{ hashFiles('scripts/download-parser-model.ts') }}

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: |
          npx vue-tsc --noEmit
          npx tsc -p tsconfig.shared.json
          npx tsc -p tsconfig.node.json --noEmit
          npx tsc -p tsconfig.electron-strict.json
          npx tsc -p tsconfig.main-strict.json
          npx tsc -p tsconfig.app-strict.json
          npx tsc -p tsconfig.api-strict.json
          npx tsc -p tsconfig.scripts.json --noEmit

      - name: Lint
        run: npx eslint .

      - name: Build backend and Electron artifacts
        run: node scripts/compile.mjs artifacts

      - name: Test with coverage
        run: npx vitest run --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Build frontend
        run: npm run build:app

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: E2E smoke tests
        run: npm run test:e2e
        env:
          CI: true
          SKIP_E2E_BUILD: 1

      - name: Build unpacked Linux app
        run: npm run pack
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
